<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bender Voice Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { font-family: 'Fira Code', monospace; }
        .glitch { text-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body class="bg-black text-green-500 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="border-2 border-green-500 p-8 rounded-xl bg-zinc-900 shadow-[0_0_20px_rgba(34,197,94,0.3)] w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-center glitch uppercase tracking-widest">Neuro Print Voice</h1>
        
        <div id="status-container" class="bg-black p-4 rounded border border-green-800 mb-6">
            <p class="text-xs text-green-800 mb-1">ESTADO DEL SISTEMA:</p>
            <p id="status" class="text-lg">ESPERANDO A BENDER...</p>
        </div>

        <button onclick="activarAudio()" id="btn-audio" class="w-full bg-green-600 text-black font-bold py-3 rounded hover:bg-green-400 transition-colors mb-4">
            ACTIVAR VOZ
        </button>

        <div class="text-xs text-green-700">
            <p>IP BENDER: <span id="ip-display">Cargando...</span></p>
            <div id="log" class="mt-4 h-32 overflow-y-auto border-t border-green-900 pt-2 space-y-1">
                <p>> Sistema iniciado...</p>
            </div>
        </div>
    </div>

    <script>
        const IP_BENDER = "192.168.18.37"; // <-- PON AQUÍ LA IP DE TU ESP32
        document.getElementById('ip-display').innerText = IP_BENDER;
        
        let audioActivado = false;

        function activarAudio() {
            audioActivado = true;
            document.getElementById('btn-audio').classList.add('hidden');
            hablar("Sistema de voz conectado");
        }

        function hablar(texto) {
            if (!audioActivado) return;
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'es-EC'; 
            voz.rate = 0.9; // Un poco más lento para que suene robótico
            window.speechSynthesis.speak(voz);
            
            const log = document.getElementById('log');
            const entry = document.createElement('p');
            entry.innerText = `> ${new Date().toLocaleTimeString()}: ${texto}`;
            log.prepend(entry);
        }

        async function chequearMensajes() {
            try {
                const response = await fetch(`http://${IP_BENDER}/get-mensaje`);
                const texto = await response.text();

                if (texto && texto.trim() !== "") {
                    document.getElementById('status').innerText = "DICIENDO: " + texto;
                    hablar(texto);
                } else {
                    document.getElementById('status').innerText = "BENDER EN LÍNEA";
                }
            } catch (err) {
                document.getElementById('status').innerText = "OFFLINE - REVISAR IP";
            }
        }

        // Consultar cada 1.5 segundos
        setInterval(chequearMensajes, 1500);
    </script>
</body>
</html>
